name: Build Portable Executables with Nuitka

on:
  push:
    tags:
      - '*'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'assets/**'
      - '.github/**'
  pull_request:
    branches:
      - dev
      - master
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'assets/**'
      - '.github/**'
      
permissions:
  contents: write

jobs:
  verify-tag-branch-rule:
    name: Verify Tag Branch Rule
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check-rule.outputs.should_build }}
      publish_release: ${{ steps.check-rule.outputs.publish_release }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Validate tag against branch rule
      id: check-rule
      run: |
        event_name="${{ github.event_name }}"
        tag_name="${{ github.ref_name }}"

        if [ "$event_name" = "pull_request" ]; then
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "publish_release=false" >> "$GITHUB_OUTPUT"
          echo "Allowed: pull request build only (no release)."
          exit 0
        fi

        git fetch origin master --depth=1
        git fetch origin dev --depth=1

        on_master=false
        on_dev=false

        if git merge-base --is-ancestor "$GITHUB_SHA" "origin/master"; then
          on_master=true
        fi

        if git merge-base --is-ancestor "$GITHUB_SHA" "origin/dev"; then
          on_dev=true
        fi

        if [[ "$tag_name" == v* ]] && [[ "$on_master" == true ]]; then
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "publish_release=true" >> "$GITHUB_OUTPUT"
          echo "Allowed: v* tag on master (release build)."
          exit 0
        fi

        if [[ "$on_dev" == true ]]; then
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "publish_release=false" >> "$GITHUB_OUTPUT"
          echo "Allowed: any tag on dev (artifact only)."
          exit 0
        fi

        echo "should_build=false" >> "$GITHUB_OUTPUT"
        echo "publish_release=false" >> "$GITHUB_OUTPUT"
        echo "Blocked: event does not meet PR or tag branch rules."

  build-windows:
    name: Build Windows Portable
    runs-on: windows-latest
    needs: verify-tag-branch-rule
    if: needs.verify-tag-branch-rule.outputs.should_build == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          choco install llvm -y
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard odfpy
          pip install -e .

      - name: Build Windows executable with Nuitka
        env:
          NUITKA_CACHE_DIR: ${{ runner.temp }}/nuitka_cache
        run: |
          $tag = "${{ github.ref_name }}"
          $version = [regex]::Match($tag, '\d+\.\d+\.\d+').Value
          if ($version -eq "") { $version = "1.0.0" }
          python -m nuitka `
            --onefile `
            --follow-imports `
            -o preservica_modify `
            --windows-console-mode=force `
            --output-dir=build `
            --nofollow-import-to=pandas.tests `
            --nofollow-import-to=pandas.conftest `
            --include-package=odf `
            --include-package=pandas `
            --include-package=preservica_modify `
            --include-data-dir=preservica_modify/options=options `
            --company-name="Preservica Mass Modify" `
            --product-name="Preservica Mass Modify" `
            --file-version="$version" `
            --product-version="$version" `
            --copyright="Copyright $(Get-Date -Format yyyy)" `
            --assume-yes-for-downloads `
            --quiet `
            --clang `
            preservica_modify/cli.py

      - name: Create Windows package
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          if ($version -eq "") { $version = "1.0.0" }

          # Create folder structure
          New-Item -ItemType Directory -Force -Path "preservica_modify/bin" | Out-Null

          # Copy executable and wrapper
          Copy-Item -Path "build/preservica_modify.exe" -Destination "preservica_modify/bin/"
          Copy-Item -Path "installer/preservica_modify.cmd" -Destination "preservica_modify/bin/"

          # Copy documentation and scripts
          Copy-Item -Path "installer/README.txt" -Destination "preservica_modify/"
          Copy-Item -Path "installer/install.cmd" -Destination "preservica_modify/"
          Copy-Item -Path "installer/uninstall.cmd" -Destination "preservica_modify/"
          Copy-Item -Path "LICENSE.md" -Destination "preservica_modify/" -ErrorAction SilentlyContinue

          # Create portable ZIP
          Compress-Archive -Path "preservica_modify" -DestinationPath "preservica_modify_windows_$version.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: preservica_modify-windows
          path: preservica_modify_windows_*.zip

      - name: Upload to release
        if: needs.verify-tag-branch-rule.outputs.publish_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: preservica_modify_windows_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Portable
    runs-on: ubuntu-latest
    needs: verify-tag-branch-rule
    if: needs.verify-tag-branch-rule.outputs.should_build == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf clang

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard odfpy
          pip install -e .

      - name: Build Linux executable with Nuitka
        run: |
          python -m nuitka \
            --onefile \
            --follow-imports \
            -o preservica_modify \
            --output-dir=build \
            --include-package=odf \
            --include-package=pandas \
            --nofollow-import-to=pandas.tests \
            --nofollow-import-to=pandas.conftest \
            --include-package=preservica_modify \
            --include-data-dir=preservica_modify/options=options \
            --assume-yes-for-downloads \
            --quiet \
            --clang \
            preservica_modify/cli.py

      - name: Create Linux artifact archive
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          version="${version#test-}"
          if [ -z "$version" ] || [ "$version" = "master" ]; then
            version="1.0.0"
          fi
          tar -czf "preservica_modify_linux_${version}.tar.gz" -C build preservica_modify

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v5
        with:
          name: preservica_modify-linux
          path: preservica_modify_linux_*.tar.gz

      - name: Upload to release
        if: needs.verify-tag-branch-rule.outputs.publish_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: preservica_modify_linux_*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS Portable
    runs-on: macos-latest
    needs: verify-tag-branch-rule
    if: needs.verify-tag-branch-rule.outputs.should_build == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard odfpy
          pip install -e .

      - name: Build macOS executable with Nuitka
        run: |
          python -m nuitka \
            --onefile \
            --follow-imports \
            -o preservica_modify \
            --output-dir=build \
            --nofollow-import-to=pandas.tests \
            --nofollow-import-to=pandas.conftest \
            --include-package=odf \
            --include-package=pandas \
            --include-package=preservica_modify \
            --include-data-dir=preservica_modify/options=options \
            --macos-create-app-bundle \
            --assume-yes-for-downloads \
            --quiet \
            --clang \
            preservica_modify/cli.py

      - name: Create macOS artifact archive
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          version="${version#test-}"
          if [ -z "$version" ] || [ "$version" = "master" ]; then
            version="1.0.0"
          fi
          tar -czf "preservica_modify_macos_${version}.tar.gz" -C build preservica_modify

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v5
        with:
          name: preservica_modify-macos
          path: preservica_modify_macos_*.tar.gz

      - name: Upload to release
        if: needs.verify-tag-branch-rule.outputs.publish_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: preservica_modify_macos_*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release-notes:
    name: Create Release Notes
    runs-on: ubuntu-latest
    needs: [verify-tag-branch-rule, build-windows, build-linux, build-macos]
    if: needs.verify-tag-branch-rule.outputs.publish_release == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Generate Release Notes
        run: |
          echo "## Portable Executables" > release_notes.md
          echo "" >> release_notes.md
          echo "### Downloads" >> release_notes.md
          echo "- **Windows**: \`preservica_modify_windows_\`" >> release_notes.md
          echo "- **Linux**: \`preservica_modify_linux_\`" >> release_notes.md
          echo "- **macOS**: \`preservica_modify_macos_\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "These are standalone executables that do not require Python to be installed." >> release_notes.md
          echo "" >> release_notes.md
          echo "### Usage" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "./preservica_modify /path/to/root -p PREFIX -o /path/to/output" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
